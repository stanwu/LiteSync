name: Release Obsidian Plugin

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run unit tests
        run: node test-classify.mjs

      - name: Package plugin
        run: |
          mkdir litesync
          cp main.js manifest.json styles.css litesync/
          zip -r litesync-plugin.zip litesync/

      - name: Get version from tag
        id: tag
        run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: LiteSync ${{ steps.tag.outputs.version }}
          files: litesync-plugin.zip
